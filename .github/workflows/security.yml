name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '23 4 * * 1'

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'
      - run: python -m pip install --upgrade pip
      - run: python -m pip install pip-audit
      - run: pip-audit -r <(grep -v '^#' requirements.txt)
      - name: Scan tracked files for credential assignments
        run: |
          if git grep -nEI "(api[_-]?key|secret|token)[[:space:]]*=[[:space:]]*[^[:space:]]+" -- . ':!tests/**' ':!docs/**'; then
            exit 1
          fi
